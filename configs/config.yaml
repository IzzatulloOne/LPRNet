# ANPR System Configuration

model:
  detector:
    weights: "models/weights/yolov10_uzb.pt"
    confidence_threshold: 0.5
    iou_threshold: 0.45
    device: "cuda"  # cuda / cpu

  recognizer:
    weights: "models/weights/lprnet_uzb.pt"
    device: "cuda"
    img_size: [94, 24]

preprocessing:
  resize: [94, 24]
  normalize: true
  deskew: true

api:
  host: "0.0.0.0"
  port: 8000
  max_image_size_mb: 10
  default_region: "UZB"

logging:
  level: "INFO"
  save_unknowns: true
  unknowns_dir: "logs/unknowns"
  low_confidence_threshold: 0.6

performance:
  target_latency_ms: 100
  max_latency_ms: 200
